[build]
  command = "npm run build"
  publish = "dist"
  base = "/"

[build.environment]
  NODE_VERSION = "20"

[context.production]
  publish = "dist"
  command = "npm run build"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
